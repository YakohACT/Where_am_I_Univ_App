# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Flutter

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # このプロジェクトは Flutter SDK のパッケージ（flutter, integration_test）に
      # 依存しているため、Dart SDK ではなく Flutter SDK をセットアップする。
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version

      # Flutter ユーザーは `dart pub get` ではなく `flutter pub get` を使う。
      - name: Install dependencies
        run: flutter pub get

      # Uncomment to enforce formatting on each commit.
      # - name: Verify formatting
      #   run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      # test/ 配下のユニット/ウィジェットテストを実行する。
      # integration_test/ は実機/エミュレータが必要なため、ここでは実行しない。
      - name: Run tests
        run: flutter test
